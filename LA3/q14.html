<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8">

    <!-- Title shown in browser tab -->
    <title>Text Styling App</title>

    <style>
        /* Class to apply bold text */
        .bold {
            font-weight: bold;
        }

        /* Class to apply italic text */
        .italic {
            font-style: italic;
        }

        /* Class to apply small caps style */
        .smallcaps {
            font-variant: small-caps;
        }
    </style>

    <script>
        // Function to apply selected style to the text
        function applyStyle(style) {

            // Change class of the paragraph element dynamically
            document.getElementById("text").className = style;
        }
    </script>
</head>

<body>

    <!-- Student Details -->
    <h3>Name: Vinayak Nautiyal</h3>
    <h3>Reg No: 24BCE2195</h3>

    <hr>

    <!-- Fieldset grouping style buttons -->
    <fieldset>
        <legend>Text Styling</legend>

        <!-- Buttons to apply different styles -->
        <input type="button" value="Bold" onclick="applyStyle('bold')">
        <input type="button" value="Italic" onclick="applyStyle('italic')">
        <input type="button" value="Small Caps" onclick="applyStyle('smallcaps')">
    </fieldset>

    <br>

    <!-- Text that will be styled -->
    <p id="text">This is a sample text</p>

</body>
</html>
