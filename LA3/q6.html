<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Sets character encoding -->
    <meta charset="UTF-8">

    <!-- Title displayed in browser tab -->
    <title>Student Information System</title>

    <style>
        /* Basic table styling for borders and spacing */
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
        }
    </style>

    <script>
        // Global array to store student objects
        var students = [];

        // Function to add a new student
        function addStudent(btn) {

            // Access the form using the button reference
            var form = btn.form;

            // Get input values from the form
            var name = form.elements["name"].value;
            var reg = form.elements["reg"].value;
            var course = form.elements["course"].value;

            // Create a student object with properties and a method
            var student = {
                name: name,
                reg: reg,
                course: course,

                // Method to return table row HTML for the student
                display: function () {
                    return "<tr><td>" + this.name + "</td><td>" + this.reg + "</td><td>" + this.course + "</td></tr>";
                }
            };

            // Add the student object to the array
            students.push(student);

            // Update the table display
            displayStudents();

            // Reset form fields after submission
            form.reset();

            // Set focus back to the name field
            form.elements["name"].focus();
        }

        // Function to display all students in table
        function displayStudents() {

            // Table header row
            var tableData = "<tr><th>Name</th><th>Reg No</th><th>Course</th></tr>";

            // Loop through student array and add each row
            for (var i = 0; i < students.length; i++) {
                tableData += students[i].display();
            }

            // Insert generated rows into table
            document.getElementById("table").innerHTML = tableData;
        }
    </script>
</head>

<body>

    <!-- Student Details -->
    <h3>Name: Vinayak Nautiyal</h3>
    <h3>Reg No: 24BCE2195</h3>

    <hr>

    <!-- Form to input student data -->
    <form>
        Name: <input type="text" name="name"><br><br>
        Reg No: <input type="text" name="reg"><br><br>
        Course: <input type="text" name="course"><br><br>

        <!-- Button to add student -->
        <input type="button" value="Add Student" onclick="addStudent(this)">
    </form>

    <br>

    <!-- Table to display student records -->
    <table id="table"></table>

</body>
</html>
