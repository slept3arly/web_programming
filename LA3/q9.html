<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8">

    <!-- Title shown in browser tab -->
    <title>Radio Button Selection</title>

    <script>
        // Function to display selected radio button value
        function showSelected() {

            // Get all radio buttons with name "color"
            var colors = document.getElementsByName("color");

            // Variable to store selected value
            var selected = "";

            // Loop through all radio buttons
            for (var i = 0; i < colors.length; i++) {

                // Check if the current radio button is selected
                if (colors[i].checked) {

                    // Store the selected value
                    selected = colors[i].value;
                }
            }

            // Display selected color on the webpage
            document.getElementById("result").innerHTML = "Selected Color: " + selected;
        }
    </script>
</head>

<body>

    <!-- Student Details -->
    <h3>Name: Vinayak Nautiyal</h3>
    <h3>Reg No: 24BCE2195</h3>

    <hr>

    <!-- Radio buttons for color selection -->
    <input type="radio" name="color" value="Red"> Red<br>
    <input type="radio" name="color" value="Green"> Green<br>
    <input type="radio" name="color" value="Blue"> Blue<br><br>

    <!-- Button to show selected option -->
    <input type="button" value="Show Selected" onclick="showSelected()">

    <!-- Output display -->
    <h3 id="result"></h3>

</body>
</html>
