<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8">

    <!-- Title shown in browser tab -->
    <title>Product Order Form</title>

    <script>
        // Function to calculate total price of selected products
        function calculateTotal() {

            // Get all checkbox elements with name "product"
            var items = document.getElementsByName("product");

            // Variable to store total price
            var total = 0;

            // Loop through all items using for...of loop
            for (let item of items) {

                // Check if item is selected
                if (item.checked) {

                    // Add price (converted to number) to total
                    total += parseFloat(item.value);
                }
            }

            // Display total price on webpage
            document.getElementById("result").innerHTML =
                "Total Price: ₹ " + total;
        }
    </script>
</head>

<body>

    <!-- Student Details -->
    <h3>Name: Vinayak Nautiyal</h3>
    <h3>Reg No: 24BCE2195</h3>

    <hr>

    <!-- Fieldset for Electronics category -->
    <fieldset>
        <!-- Title for group -->
        <legend>Electronics</legend>

        <!-- Product options with prices as values -->
        <input type="checkbox" name="product" value="5000"> Mobile (5000)<br>
        <input type="checkbox" name="product" value="2000"> Headphones (2000)<br>
    </fieldset>

    <br>

    <!-- Fieldset for Accessories category -->
    <fieldset>
        <legend>Accessories</legend>

        <input type="checkbox" name="product" value="500"> Mouse (500)<br>
        <input type="checkbox" name="product" value="1000"> Keyboard (1000)<br>
    </fieldset>

    <br>

    <!-- Button to calculate total -->
    <input type="button" value="Calculate Total" onclick="calculateTotal()">

    <!-- Output display -->
    <h3 id="result"></h3>

</body>
</html>
