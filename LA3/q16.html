<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8">

    <!-- Title shown in browser tab -->
    <title>Image Gallery</title>

    <style>
        /* Basic page styling */
        body {
            margin: 20px;
            font-family: Arial;
        }

        /* Style applied to all images */
        img {
            width: 150px;          /* Set image size */
            position: absolute;    /* Allows overlapping */
            cursor: pointer;       /* Indicates clickable images */
        }

        /* Positioning images slightly apart */
        #img1 { top: 120px; left: 20px; }
        #img2 { top: 150px; left: 80px; }
        #img3 { top: 180px; left: 140px; }
    </style>

    <script>
        // Variable to track highest z-index
        var topIndex = 1;

        // Function to bring clicked image to front
        function bringToFront(img) {

            // Increase z-index so selected image appears on top
            img.style.zIndex = ++topIndex;
        }
    </script>
</head>

<body>

    <!-- Student Details -->
    <h3>Name: Vinayak Nautiyal</h3>
    <h3>Reg No: 24BCE2195</h3>

    <hr>

    <!-- Images -->
    <img id="img1" src="./Resources/child.jpg" onclick="bringToFront(this)">
    <img id="img2" src="./Resources/fire.jpg" onclick="bringToFront(this)">
    <img id="img3" src="./Resources/police.png" onclick="bringToFront(this)">

</body>
</html>
