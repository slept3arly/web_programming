<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8">

    <!-- Title shown in browser tab -->
    <title>Checkbox Selection</title>

    <script>
        // Function to display selected checkboxes
        function showSelected() {

            // Get all checkbox elements with name "subject"
            var subjects = document.getElementsByName("subject");

            // Array to store selected subjects
            var selected = [];

            // Variable to count selected items
            var count = 0;

            // Loop through all checkboxes
            for (var i = 0; i < subjects.length; i++) {

                // Check if checkbox is selected
                if (subjects[i].checked) {

                    // Add selected value to array
                    selected.push(subjects[i].value);

                    // Increment count
                    count++;
                }
            }

            // Display count and selected subjects
            document.getElementById("result").innerHTML =
                "Selected Count: " + count + "<br>" +
                "Subjects: " + selected.join(", ");
        }
    </script>
</head>

<body>

    <!-- Student Details -->
    <h3>Name: Vinayak Nautiyal</h3>
    <h3>Reg No: 24BCE2195</h3>

    <hr>

    <!-- Checkboxes for multiple selections -->
    <input type="checkbox" name="subject" value="Math"> Math<br>
    <input type="checkbox" name="subject" value="Physics"> Physics<br>
    <input type="checkbox" name="subject" value="Chemistry"> Chemistry<br>
    <input type="checkbox" name="subject" value="Biology"> Biology<br><br>

    <!-- Button to show selected subjects -->
    <input type="button" value="Show Selection" onclick="showSelected()">

    <!-- Output display -->
    <h3 id="result"></h3>

</body>
</html>
