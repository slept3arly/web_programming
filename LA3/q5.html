<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8">

    <!-- Title shown in browser tab -->
    <title>Calculator</title>

    <script>
        // Function to perform calculation based on selected operation
        function calculate(operation) {

            // Get user input values and convert them to numbers
            var num1 = parseFloat(document.getElementById("num1").value);
            var num2 = parseFloat(document.getElementById("num2").value);

            // Variable to store result
            var result;

            // Perform operation based on input parameter
            switch (operation) {

                case '+':
                    // Addition
                    result = num1 + num2;
                    break;

                case '-':
                    // Subtraction
                    result = num1 - num2;
                    break;

                case '*':
                    // Multiplication
                    result = num1 * num2;
                    break;

                case '/':
                    // Division with zero check
                    if (num2 === 0) {
                        result = "Cannot divide by zero";
                    } else {
                        result = num1 / num2;
                    }
                    break;

                default:
                    // Handles invalid operation
                    result = "Invalid operation";
            }

            // Display result on the webpage
            document.getElementById("output").innerHTML = "Result: " + result;
        }
    </script>
</head>

<body>

    <!-- Student Details -->
    <h3>Name: Vinayak Nautiyal</h3>
    <h3>Reg No: 24BCE2195</h3>

    <hr>

    <!-- Input fields for numbers -->
    Number 1:
    <input type="number" id="num1" step="any"><br><br>

    Number 2:
    <input type="number" id="num2" step="any"><br><br>

    <!-- Buttons to perform different operations -->
    <input type="button" value="Add" onclick="calculate('+')">
    <input type="button" value="Subtract" onclick="calculate('-')">
    <input type="button" value="Multiply" onclick="calculate('*')">
    <input type="button" value="Divide" onclick="calculate('/')">

    <!-- Area to display result -->
    <h3 id="output"></h3>

</body>
</html>
