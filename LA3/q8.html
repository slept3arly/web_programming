<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiplication Table</title>

    <script>
        function printTable() {

            var num = parseInt(document.getElementById("num").value);
            var i = 1;
            var output = "";

            do {
                output += num + " x " + i + " = " + (num * i) + "<br>";
                i++;
            } while (i <= 10);

            document.getElementById("result").innerHTML = output;
        }
    </script>
</head>

<body>

    <!-- Student Details -->
    <h3>Name: Vinayak Nautiyal</h3>
    <h3>Reg No: 24BCE2195</h3>

    <hr>

    <!-- Input -->
    Enter Number:
    <input type="text" id="num"><br><br>

    <!-- Button -->
    <input type="button" value="Generate Table" onclick="printTable()">

    <!-- Output -->
    <h3 id="result"></h3>

</body>
</html>
